<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三点跳动 Loading</title>
  <style>
    /* 页面居中显示 */
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
    }

    /* 三个点的容器 */
    .loading-dots {
      display: flex;          /* 横向排列三个点 */
      gap: 8px;               /* 点与点之间的间距 */
      align-items: center;    /* 垂直居中 */
    }

    /* 单个点 */
    .dot {
      width: 10px;            /* 点的宽度 */
      height: 10px;           /* 点的高度 */
      background: #000;       /* 点的颜色 */
      border-radius: 50%;      /* 变成圆形 */
      /* 应用跳动动画：持续时间1.4秒，无限循环，动画以低速开始和结束。 */
      animation: bounce 1.4s infinite ease-in-out;  
    }

    /* 第一个点延迟更少 */
    .dot:nth-child(1) {
      animation-delay: 0s;
    }

    /* 第二个点延迟一点 */
    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    /* 第三个点延迟更多一点 */
    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    /* 跳动动画 */
    @keyframes bounce {
      0%,80%, 100% {/* 开头是小的，结束也是小的，所以循环时无缝连接0% 到 40%：快速变大;40% 到 80%：慢慢变小;80% 到 100%：保持!!!较小，等待下一轮 */
        transform: scale(0);   /* 缩放转换，缩小到几乎看不见 */
        opacity: 0.3;          /* 顺便降低透明度 */
      }
      40% {
        transform: scale(1);   /* 放大到正常大小 */
        opacity: 1;            /* 正常透明度 */
      }
    }
  </style>
</head>
<body>
  <div class="loading-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</body>
</html>
