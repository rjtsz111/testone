<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旋转圆环 Loading</title>
  <style>
    /* 页面居中显示 */
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
    }

    /* 加载圆环 */
    .loading {
      width: 40px;              /* 圆环整体宽度 */
      height: 40px;             /* 圆环整体高度 */
      border: 4px solid #ccc;   /* 灰色边框，形成圆环基础 */
      border-top-color: #000;   /* 顶部边框改成黑色，制造“旋转段”效果 */
      border-radius: 50%;       /* 变成圆形 */
      animation: spin 1s linear infinite; /* 旋转动画：1秒一圈，匀速，无限循环 */
    }
/* animation: spin ... = “我要播放一个叫 spin 的动画”
   @keyframes spin = “这个动画具体怎么动” */
    /* 定义旋转动画 */
    @keyframes spin {
      to {
        transform: rotate(360deg); /* 旋转360度 */
      }
    }
  </style>
</head>
<body>
  <div class="loading"></div>
</body>
</html>
