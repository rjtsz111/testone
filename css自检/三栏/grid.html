<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .container {
  display: grid;
  grid-template-columns: 200px 1fr 200px;
}

.left {
  background: #d9f0ff;
}

.center {
  background: #f1f1f1;
}

.right {
  background: #ffe4d6;
}
  </style>
</head>
<body>
  <div class="container">
    <div class="left">左侧栏</div>
    <div class="center">中间内容</div>
    <div class="right">右侧栏</div>
</div>
</body>
</html>
