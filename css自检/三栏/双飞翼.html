<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .container {
      overflow: hidden;
    }

    .main {
      float: left;
      width: 100%;/* 负责 占满整行 */
    }

    .main-inner {
      margin: 0 200px;/* 内容区域不被左右栏挡住 */
    }

    .left {
      float: left;
      width: 200px;
      margin-left: -100%;
    }

    .right {
      float: left;
      width: 200px;
      margin-left: -200px;
    }
  </style>
</head>
<body>
  <div class="container">
  <div class="main">
    <div class="main-inner">中间内容</div>
  </div>
  <div class="left">左栏</div>
  <div class="right">右栏</div>
</div>
</body>
</html>
