<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS 三角形示例</title>
  <style>
    .triangle-right {
      width: 0;
      height: 0;
      border-left: 100px solid red;/* 100px是底边总长度 */
      border-top: 50px solid transparent;/* 50px是底边上半边的长度，transparent是透明颜色 */
      border-bottom: 50px solid transparent;/* 50px是底边下半边的长度，transparent是透明颜色 */
      margin: 100px auto;
    }
  </style>
</head>
<body>
  <div class="triangle-right"></div>
</body>
</html>
