<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* 子绝父相 */
    .containter{
      position: relative;
      padding-left:200px;

    }
    .left{
      position: absolute;
      width:200px;
      left: 0;
      background-color: #000;
    }
    .right{
      background-color: #ff0000;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left">left</div>
    <div class="right">right</div>
</div>
</body>
</html>
