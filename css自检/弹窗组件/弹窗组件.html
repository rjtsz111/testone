<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    html, body {
    height: 100%;
    margin: 0;
    }

    .page {
      min-height: 100vh;
    }

    /* 遮罩层 */
    .modal-mask {
      position: fixed;
      inset: 0;               /* 等价于 top/right/bottom/left: 0 */
      background: rgba(0, 0, 0, 0.5);
      
      display: flex;/* 是固定定位，相对于视口定位，不随滚动变化 */
      align-items: center;
      justify-content: center;

      z-index: 1000;
    }

    /* 弹窗主体 */
    .modal {
      width: min(90vw, 500px);
      max-height: 80vh;/* 给弹窗主体限制最大高度： */
      background: #fff;
      border-radius: 12px;
      overflow: hidden;

      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    /* 标题 */
    .modal-header,
    .modal-footer {
      padding: 16px;
      flex-shrink: 0;
      border-bottom: 1px solid #eee;
    }

    .modal-footer {
      border-bottom: none;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    /* 内容区域可滚动 */
    .modal-body {
      padding: 16px;
      overflow: auto;/* 如果内容被修剪，则浏览器会显示滚动条以便查看其余的内容。 */
      flex: 1;/* 中间内容区自动撑开，剩下的空间都给它；如果内容太多，就在这个区域滚动。 */
    }
  </style>
</head>
<body>
  <div class="page">
  <button class="open-btn">打开弹窗</button>

  <div class="modal-mask">
    <div class="modal">
      <div class="modal-header">
        <h3>弹窗标题</h3>
      </div>

      <div class="modal-body">
        <p>这里是弹窗内容。</p>
        <p>内容很多时，弹窗内部可以滚动。</p>
        <p>这里是弹窗内容。</p>
        <p>这里是弹窗内容。</p>
        <p>这里是弹窗内容。</p>
        <p>这里是弹窗内容。</p>
        <p>这里是弹窗内容。</p>
        <p>这里是弹窗内容。</p>
        <p>这里是弹窗内容。</p>
        <p>这里是弹窗内容。</p>
        <p>这里是弹窗内容。</p>
        <p>这里是弹窗内容。</p>
        <p>这里是弹窗内容。</p>
        <p>这里是弹窗内容。</p>
        <p>这里是弹窗内容。</p>
      </div>

      <div class="modal-footer">
        <button>取消</button>
        <button>确定</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
