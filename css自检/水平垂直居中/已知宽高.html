<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>绝对定位+-margin</title>
  <style>
    .parent{
      position: relative;
      width: 300px;
      height: 300px;
      background-color: #000000;
    }
    .child{
      position: absolute;
      width: 100px;
      height: 100px;
      background-color: #ff0000;
      top:50%;
      left:50%;
      margin-left: -50px;
      margin-top: -50px;
    }
  </style>
</head>
<body>
  <div class="parent">
    <div class="child">居中内容</div>
</div>
</body>
</html>
