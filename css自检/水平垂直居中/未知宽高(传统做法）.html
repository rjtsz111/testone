<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>绝对定位+-transform</title>
  <style>
    .parent{
      position: relative;
      width: 300px;
      height: 300px;
      background-color: #000000;

    }
    .child{
      position: absolute;
      left: 50%;
      top: 50%;
      transform:translate(-50%,-50%);
      background : #ff0000;
    }
  </style>
</head>
<body>
  <div class="parent">
    <div class="child">居中内容</div>
  </div>
</body>
</html>
