<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .parent {
    width: 300px;
    height: 300px;
    display: grid;
    /* 水平垂直居中 */
    place-items: center;
    border: 1px solid #ccc;
  }

    .child {
      background: pink;
  }
  </style>
</head>
<body>
  <div class="parent">
    <div class="child">居中内容</div>
</div>
</body>
</html>
