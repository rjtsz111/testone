<body>
  <script>
for (let x = 1; x <= 9; x++) {
  let row = "";
  for (let y = 1; y <= x; y++) {
    row += `${y}*${x}=${y * x} `;/* 如果你要的是九九乘法表,应该把一行的内容先拼起来，最后再输出这一整行。 */
  }
  console.log(row);
}
  </script>
</body>
