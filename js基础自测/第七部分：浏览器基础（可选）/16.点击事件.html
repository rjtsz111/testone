<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <button id="ddd"> 你点我呀 </button>
    <script>
        const ddd = document.getElementById('ddd'); /* 获取按钮元素 */

        ddd.addEventListener('click',function(){/* 给按钮绑定点击事件 */
            console.log('按钮被点击了')
        })
    </script>
</body>
</html>
