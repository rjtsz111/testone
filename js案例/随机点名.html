<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        h2{
            text-align: center;
        }
        .box{
            width: 600px;
            margin: 50px auto;
            display: flex;
            font-size: 25px;
            line-height: 40px;
        }
        .name{
            width: 450px;
            height: 40px;
            color: red;
        }
        .btns{
            text-align: center;
        }
        .btns button{
            width: 120px;
            height: 35px;
            margin: 0 50px;
        }

    </style>
</head>
<body>
    <h2>随机点名</h2>
    <div class="box">
        <span>名字是：</span>
        <div class="name"></div>
    </div>
    <div class="btns">
        <button class="start">开始</button>
        <button class="end">结束</button>
    </div>
    
    <script>
        const arr = ['yyqx','易烊千玺','千纸鹤','礐嶨']
        const start = document.querySelector('.start')
        const end = document.querySelector('.end')
        const name = document.querySelector('.name')

        let random = 0
        let timerId =0
        start.addEventListener('click',function(){
            timerId = setInterval(function(){
                random = parseInt(Math.random() * arr.length)
                name.innerHTML = arr[random]
            },35)
            if(arr.length === 1){
                start.disabled =end.disabled =true
            }
        })

        end.addEventListener('click',function(){
            clearInterval(timerId)
            arr.splice(random, 1)
            console.log(arr)
        })
        
    </script>
</body>
</html>
