        a{

           text-decoration: none;/* 取消下划线 */
        }
        a:hover{

        ol, ul{

        }
        .classify li{
            height: 32px;
            line-height: 32px;
            margin: 0 8px;/* margin动盒子，padding挤内容 */
            border-radius: 4px;
            transition: all 0.5s;
        }
        /* 第一个li里面的文字默认红色 */
        .classify li:first-child a,
        .classify li:first-child{
            color: #ff5000;
        }

        .classify li a{

        }
        .classify li:hover{
